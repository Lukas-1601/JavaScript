<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen</title>
</head>
<body>
    <div class="inloggen">
        <h1>Inloggen</h1>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="loginButton">Inloggen</button>
        <div id="message"></div>
    </div>
</body>
<style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    h1 {
        font-family: Arial, sans-serif;
    }

    .inloggen {
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: aliceblue;
        padding-bottom: 20px;
        padding-top: 10px;
        border: 1px solid lightblue;
    }

    input {
        margin: 10px;
        padding: 10px;
        width: 200px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        padding: 10px 20px;
        border-radius: 5px;
        border: none;
        background-color: #28a745;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background-color: #218838;
    }
</style>
<script src="Inloggen.js"></script>
</html>
